<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMR 물류이송 시뮬레이션 V2</title>
    <link rel="stylesheet" href="styles_v2.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>AMR 물류이송 시뮬레이션 V2</h1>
            <div class="controls-panel">
                <div class="controls-group">
                    <span class="label">Speed</span>
                    <button id="btn-1x" class="btn active">1x</button>
                    <button id="btn-10x" class="btn">10x</button>
                    <button id="btn-20x" class="btn">20x</button>
                </div>
                <div class="controls-group">
                    <span class="label">AMR</span>
                    <button id="btn-amr1" class="btn active">1대</button>
                    <button id="btn-amr2" class="btn">2대</button>
                </div>
            </div>
        </header>
        <div class="canvas-container">
            <canvas id="simCanvas" width="1300" height="750"></canvas>
        </div>
    </div>
    <script src="script_v2.js"></script>
</body>
</html>
