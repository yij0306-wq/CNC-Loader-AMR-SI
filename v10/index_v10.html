<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMR 물류이송 시뮬레이션 V10 (생산량 기반 투입 및 동방향 회피)</title>
    <link rel="stylesheet" href="styles_v10.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="title-group">
                <h1>AMR 물류이송 시뮬레이션 V10</h1>
                <div class="stats-panel">
                    <div class="stat-box"><span style="color:#60a5fa">M3 5X</span> <span id="prod-m3-5x" class="count">0</span></div>
                    <div class="stat-box"><span style="color:#34d399">M3 UPPER</span> <span id="prod-m3-upper" class="count">0</span></div>
                    <div class="stat-box"><span style="color:#a78bfa">M3 2ND</span> <span id="prod-m3-2nd" class="count">0</span></div>
                    <button id="btn-reset" class="btn btn-danger">초기화</button>
                </div>
            </div>
            <div class="controls-panel">
                <div class="controls-group">
                    <span class="label">Speed</span>
                    <button id="btn-1x" class="btn active">1x</button>
                    <button id="btn-2x" class="btn">2x</button>
                    <button id="btn-5x" class="btn">5x</button>
                    <button id="btn-10x" class="btn">10x</button>
                </div>
                <div class="controls-group">
                    <span class="label">호출 모드</span>
                    <button id="btn-mode-8" class="btn active">8칸 완료시</button>
                    <button id="btn-mode-custom" class="btn">지정 칸수</button>
                    <input type="number" id="input-custom-trays" min="1" max="7" value="5" class="input-number" title="지정 칸수">
                </div>
                <div class="controls-group">
                    <span class="label">회피존</span>
                    <button id="btn-add-siding" class="btn">추가 (+)</button>
                    <button id="btn-reset-siding" class="btn">초기화</button>
                </div>
                <div class="controls-group">
                    <span class="label">AMR 대수</span>
                    <button id="btn-amr1" class="btn active">1대</button>
                    <button id="btn-amr2" class="btn">2대</button>
                    <button id="btn-amr3" class="btn">3대</button>
                    <button id="btn-amr4" class="btn">4대</button>
                </div>
            </div>
        </header>
        <div class="canvas-container">
            <canvas id="simCanvas" width="1350" height="750"></canvas>
        </div>
    </div>
    <script src="script_v10.js"></script>
</body>
</html>
